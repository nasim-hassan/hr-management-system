name: hr_management_system
description: "A comprehensive mobile HR Management System built with Flutter and Supabase"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Supabase & Backend
  supabase_flutter: ^1.10.0
  supabase: ^1.11.2

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.1

  # Authentication
  flutter_secure_storage: ^9.0.0

  # UI & Navigation
  flutter_svg: ^2.0.0
  intl: ^0.19.0
  get: ^4.6.0
  go_router: ^11.0.0

  # PDF Generation
  pdf: ^3.10.0
  printing: ^5.11.0

  # Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0

  # Logging & Debugging
  logger: ^2.0.1
  talker: ^3.1.1

  # Date & Time
  timeago: ^3.4.0

  # Charts & Analytics
  fl_chart: ^0.66.0

  # Connectivity
  connectivity_plus: ^5.0.0

  # Utils
  uuid: ^4.0.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1
  freezed: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts removed temporarily to avoid build error